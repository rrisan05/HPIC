<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamlin Park Islamic Center · Prayer Times</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --navy: #0b1120;
    --navy-mid: #111827;
    --navy-card: #162032;
    --navy-row: #1a2a3e;
    --text: #e8dfc8;
    --text-dim: #8fa3b8;
    --active: #60d394;
    --active-dim: rgba(96,211,148,0.12);
  }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
    overflow-x: hidden;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(201,168,76,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(96,150,211,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: var(--min, 0.1); }
    50% { opacity: var(--max, 0.7); }
  }

  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: fadeUp 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    text-align: center;
    padding: 10px 0 4px;
  }
  .arabic-greeting {
    font-size: 28px;
    color: var(--gold-light);
    letter-spacing: 0.04em;
    margin-bottom: 12px;
    font-weight: 400;
    opacity: 0.9;
    text-shadow: 0 0 20px rgba(201,168,76,0.3);
  }

  /* Mosque icon */
  .mosque-icon {
    font-size: 42px;
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.5));
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(201,168,76,0.4)); }
    50% { filter: drop-shadow(0 0 20px rgba(201,168,76,0.8)); }
  }
  .masjid-name {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--gold-light);
    margin: 10px 0 4px;
    line-height: 1.3;
  }
  .location {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0.4;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .divider::after {
    background: linear-gradient(to left, transparent, var(--gold));
  }
  .divider span { color: var(--gold); font-size: 14px; }

  /* Date bar */
  .date-bar {
    background: var(--navy-card);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
  }
  .date-bar .gregorian { color: var(--text); font-weight: 700; }
  .date-bar .hijri { color: var(--gold); font-size: 13px; }
  .date-bar .time-now { color: var(--text-dim); font-size: 13px; font-variant-numeric: tabular-nums; }

  /* Next prayer card */
  .next-card {
    background: linear-gradient(135deg, #1a2a3e 0%, #0f1f30 100%);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 16px;
    padding: 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(201,168,76,0.15);
  }
  .next-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .next-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .next-name {
    font-family: 'Cinzel', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--gold-light);
    margin-bottom: 6px;
  }
  .next-time-display {
    font-size: 15px;
    color: var(--text-dim);
    margin-bottom: 18px;
  }
  .countdown {
    display: flex;
    justify-content: center;
    gap: 12px;
  }
  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 52px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 10px 8px 8px;
  }
  .cd-num {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--gold-light);
    line-height: 1;
  }
  .cd-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .cd-sep {
    font-size: 26px;
    color: var(--gold);
    opacity: 0.4;
    align-self: center;
    margin-bottom: 16px;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.1; } }

  /* Jummah badge */
  .jummah-banner {
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 10px;
    padding: 10px 16px;
    text-align: center;
    font-size: 14px;
    color: var(--gold-light);
    display: none;
  }
  .jummah-banner.visible { display: block; }
  .jummah-banner strong { font-family: 'Cinzel', serif; }

  /* Prayer table */
  .prayer-card {
    background: var(--navy-card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .prayer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 22px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.3s;
    position: relative;
  }
  .prayer-row:last-child { border-bottom: none; }
  .prayer-row.active {
    background: var(--active-dim);
    border-bottom-color: rgba(96,211,148,0.15);
  }
  .prayer-row.active .prayer-name { color: var(--active); }
  .prayer-row.active .prayer-time { color: var(--active); }
  .prayer-row.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--active);
    border-radius: 0 2px 2px 0;
  }
  .prayer-row.passed { opacity: 0.4; }
  .row-left { display: flex; align-items: center; gap: 14px; }
  .prayer-icon { font-size: 18px; width: 28px; text-align: center; }
  .prayer-name {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.03em;
  }
  .prayer-name-ar {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
    letter-spacing: 0.05em;
  }
  .prayer-time {
    font-size: 17px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .active-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--active);
    box-shadow: 0 0 8px var(--active);
    margin-left: 10px;
    display: none;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .prayer-row.active .active-dot { display: block; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
  }

  /* Donation */
  .donate-section {
    text-align: center;
    padding: 4px 0 2px;
  }
  .donate-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .donate-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #b8922a, #c9a84c, #e8c97a);
    color: #0b1120;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 14px 36px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(201,168,76,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .donate-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(201,168,76,0.55);
  }
  .donate-btn:active { transform: translateY(0); }
  .donate-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 10px;
    opacity: 0.7;
  }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0.5;
    padding-top: 4px;
    letter-spacing: 0.05em;
  }

  /* Loading */
  .loading {
    text-align: center;
    color: var(--text-dim);
    padding: 40px;
    font-size: 14px;
    letter-spacing: 0.1em;
  }
  .loading::after {
    content: '';
    animation: dots 1.5s steps(3, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<div class="page">
  <!-- Header -->
  <div class="header">
    <div class="arabic-greeting">ٱلسَّلَامُ عَلَيْكُمْ</div>
    <div class="mosque-icon">🕌</div>
    <h1 class="masjid-name">Hamlin Park<br>Islamic Center</h1>
    <p class="location">416 Wohlers Ave, Buffalo, NY 14208</p>
  </div>

  <div class="divider"><span>✦</span></div>

  <!-- Date bar -->
  <div class="date-bar">
    <div>
      <div class="gregorian" id="gregorianDate">—</div>
      <div class="hijri" id="hijriDate">Loading Hijri date...</div>
    </div>
    <div class="time-now" id="liveClock">—</div>
  </div>

  <!-- Jummah banner -->
  <div class="jummah-banner" id="jummahBanner">
    <strong>Jumu'ah</strong> — Friday Prayer at 1:30 PM · All are welcome
  </div>

  <!-- Next prayer -->
  <div class="next-card" id="nextCard">
    <div class="loading">Loading prayer times</div>
  </div>

  <!-- Prayer rows -->
  <div class="prayer-card" id="prayerCard" style="display:none">
    <!-- rows injected by JS -->
  </div>

  <div class="footer" id="footer"></div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${2 + Math.random()*4}s;
      --min:${0.05 + Math.random()*0.15};
      --max:${0.3 + Math.random()*0.6};
      animation-delay:${Math.random()*5}s;
    `;
    starsEl.appendChild(s);
  }

  const LAT = 42.8864, LON = -78.8784;
  const JUMMAH = '13:30';
  const PRAYER_META = {
    Fajr:    { icon: '🌙', ar: 'الفجر' },
    Sunrise: { icon: '🌅', ar: 'الشروق' },
    Dhuhr:   { icon: '☀️',  ar: 'الظهر' },
    Asr:     { icon: '🌤️', ar: 'العصر' },
    Maghrib: { icon: '🌇', ar: 'المغرب' },
    Isha:    { icon: '🌃', ar: 'العشاء' },
  };
  const SHOWN = ['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];

  let prayers = {};
  let hijriStr = '';

  function fmt12(t) {
    let [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  function toMins(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }

  function nowMins() {
    const n = new Date();
    return n.getHours() * 60 + n.getMinutes();
  }

  async function loadTimes() {
    try {
      const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${LAT}&longitude=${LON}&method=2`);
      const data = await res.json();
      const t = data.data.timings;
      prayers = { Fajr: t.Fajr, Sunrise: t.Sunrise, Dhuhr: t.Dhuhr, Asr: t.Asr, Maghrib: t.Maghrib, Isha: t.Isha };
      const h = data.data.date.hijri;
      hijriStr = `${h.day} ${h.month.en} ${h.year} AH`;
      document.getElementById('hijriDate').textContent = hijriStr;
      renderPrayers();
      document.getElementById('prayerCard').style.display = '';
    } catch (e) {
      document.getElementById('nextCard').innerHTML = `<div class="loading" style="color:#f87171">Could not load prayer times.<br>Please check your connection.</div>`;
    }
  }

  function renderPrayers() {
    const card = document.getElementById('prayerCard');
    const nm = nowMins();
    card.innerHTML = '';
    let nextIdx = -1;

    SHOWN.forEach((name, i) => {
      const pm = toMins(prayers[name]);
      const row = document.createElement('div');
      row.className = 'prayer-row';
      row.id = `row-${name}`;
      const meta = PRAYER_META[name];

      let state = '';
      if (pm < nm) state = 'passed';

      row.innerHTML = `
        <div class="row-left">
          <span class="prayer-icon">${meta.icon}</span>
          <div>
            <div class="prayer-name">${name}</div>
            <div class="prayer-name-ar">${meta.ar}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="prayer-time">${fmt12(prayers[name])}</div>
          <div class="active-dot"></div>
        </div>
      `;
      if (state) row.classList.add(state);
      card.appendChild(row);
    });

    updateActiveRow();
  }

  function getNextPrayer() {
    const now = new Date();
    const nm = nowMins();

    // Check Jummah on Friday
    if (now.getDay() === 5) {
      const jm = toMins(JUMMAH);
      if (nm < jm) {
        const t = new Date();
        t.setHours(13, 30, 0, 0);
        return { name: "Jumu'ah", time: t, timeStr: '1:30 PM' };
      }
    }

    for (const name of SHOWN) {
      const pm = toMins(prayers[name]);
      if (nm < pm) {
        const t = new Date();
        const [h, m] = prayers[name].split(':').map(Number);
        t.setHours(h, m, 0, 0);
        return { name, time: t, timeStr: fmt12(prayers[name]) };
      }
    }

    // Wrap to Fajr tomorrow
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const [h, m] = prayers.Fajr.split(':').map(Number);
    tomorrow.setHours(h, m, 0, 0);
    return { name: 'Fajr', time: tomorrow, timeStr: fmt12(prayers.Fajr) };
  }

  function updateActiveRow() {
    const nm = nowMins();
    let activeSet = false;
    SHOWN.forEach((name, i) => {
      const row = document.getElementById(`row-${name}`);
      if (!row) return;
      row.classList.remove('active', 'passed');
      const pm = toMins(prayers[name]);
      if (!activeSet && pm >= nm) {
        row.classList.add('active');
        activeSet = true;
      } else if (pm < nm) {
        row.classList.add('passed');
      }
    });
  }

  function updateNext() {
    if (!prayers.Fajr) return;
    const next = getNextPrayer();
    const diff = next.time - new Date();
    const totalSec = Math.max(0, Math.floor(diff / 1000));
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;

    document.getElementById('nextCard').innerHTML = `
      <div class="next-label">Next Prayer</div>
      <div class="next-name">${next.name}</div>
      <div class="next-time-display">${next.timeStr}</div>
      <div class="countdown">
        <div class="cd-unit">
          <div class="cd-num">${String(h).padStart(2,'0')}</div>
          <div class="cd-label">hrs</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-num">${String(m).padStart(2,'0')}</div>
          <div class="cd-label">min</div>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <div class="cd-num">${String(s).padStart(2,'0')}</div>
          <div class="cd-label">sec</div>
        </div>
      </div>
    `;
  }

  function updateClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
    document.getElementById('liveClock').textContent = timeStr;

    const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    document.getElementById('gregorianDate').textContent = dateStr;

    // Jummah
    if (now.getDay() === 5) {
      document.getElementById('jummahBanner').classList.add('visible');
    }

    // Footer
    document.getElementById('footer').textContent = `Times calculated for Buffalo, NY · Method: ISNA`;
  }

  // Init
  loadTimes();
  updateClock();
  setInterval(() => {
    updateClock();
    updateNext();
    updateActiveRow();
  }, 1000);
</script>
</body>
</html>
